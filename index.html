<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Y-Cam</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --blue: #4169E1;
    --blue-dark: #3358c4;
    --bg: #ffffff;
    --gray: #999;
    --line: #e8e8e8;
    --light: #f7f7f7;
  }
  body {
    background: var(--bg);
    color: #1a1a1a;
    font-family: 'Nunito', 'M PLUS Rounded 1c', 'Varela Round', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    user-select: none;
  }
  #header {
    width: 100%;
    max-width: 420px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px 12px;
    background: #fff;
  }
  #logo {
    font-size: 14px;
    font-weight: 900;
    letter-spacing: 0.2em;
    color: var(--blue);
    text-transform: uppercase;
  }
  #mode-badge {
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--gray);
    border: 1px solid var(--line);
    padding: 3px 8px;
    border-radius: 2px;
    text-transform: uppercase;
    font-weight: 600;
  }

  /* 4:5 viewfinder */
  #viewfinder-wrap {
    position: relative;
    width: 100%;
    max-width: 420px;
    aspect-ratio: 4 / 5;
    overflow: hidden;
    background: #000;
    flex-shrink: 0;
  }
  #video {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  #grain {
    position: absolute; inset: 0;
    pointer-events: none; opacity: 0;
    transition: opacity 0.3s;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 180px 180px;
    mix-blend-mode: overlay;
  }
  #vignette {
    position: absolute; inset: 0;
    pointer-events: none; opacity: 0;
    transition: opacity 0.3s;
    background: radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,0.72) 100%);
  }
  #canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: none; }
  .corner { position: absolute; width: 16px; height: 16px; opacity: 0.45; }
  .corner.tl { top: 10px; left: 10px; border-top: 1px solid #fff; border-left: 1px solid #fff; }
  .corner.tr { top: 10px; right: 10px; border-top: 1px solid #fff; border-right: 1px solid #fff; }
  .corner.bl { bottom: 10px; left: 10px; border-bottom: 1px solid #fff; border-left: 1px solid #fff; }
  .corner.br { bottom: 10px; right: 10px; border-bottom: 1px solid #fff; border-right: 1px solid #fff; }
  #focus-ring {
    position: absolute;
    width: 56px; height: 56px;
    border: 2px solid var(--blue);
    transform: translate(-50%, -50%);
    pointer-events: none; display: none;
    animation: focusPulse 0.3s ease-out;
  }
  @keyframes focusPulse {
    from { width: 84px; height: 84px; opacity: 0; }
    to   { width: 56px; height: 56px; opacity: 1; }
  }
  #flash { position: absolute; inset: 0; background: white; opacity: 0; pointer-events: none; transition: opacity 0.05s; }
  #film-counter {
    position: absolute; top: 10px; right: 12px;
    font-size: 11px; color: rgba(255,255,255,0.7);
    font-variant-numeric: tabular-nums; letter-spacing: 0.05em;
  }
  #thumb-wrap {
    position: absolute; bottom: 10px; left: 10px;
    width: 38px; height: 48px;
    border: 1.5px solid rgba(255,255,255,0.6);
    border-radius: 2px; overflow: hidden;
    opacity: 0; transition: opacity 0.3s; cursor: pointer;
  }
  #thumb-wrap img { width: 100%; height: 100%; object-fit: cover; }

  /* Preset bar */
  #preset-bar {
    width: 100%; max-width: 420px;
    display: flex;
    background: var(--light);
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
  }
  .preset-btn {
    flex: 1; padding: 12px 2px;
    background: none; border: none;
    border-right: 1px solid var(--line);
    color: var(--gray);
    font-size: 9.5px; letter-spacing: 0.06em;
    text-transform: uppercase; cursor: pointer;
    font-weight: 700; transition: color 0.2s, background 0.2s;
  }
  .preset-btn:last-child { border-right: none; }
  .preset-btn.active { color: var(--blue); background: rgba(65,105,225,0.08); }
  .preset-btn { border-radius: 0; }

  /* Controls */
  #controls {
    width: 100%; max-width: 420px;
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 22px 36px 28px;
    background: #fff;
  }
  #flip-btn, #save-btn {
    width: 50px; height: 50px;
    background: var(--light); border: none;
    border-radius: 50%; color: #555;
    font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  #flip-btn:active, #save-btn:active { background: #e0e0e0; }
  #shutter-btn {
    width: 90px; height: 90px;
    background: none; border: none;
    cursor: pointer;
    position: relative; transition: transform 0.12s;
    padding: 0;
    display: flex; align-items: center; justify-content: center;
    filter: drop-shadow(0 4px 12px rgba(255,220,0,0.5));
  }
  #shutter-btn img {
    width: 90px; height: 90px;
    object-fit: contain;
    display: block;
  }
  #shutter-btn:active { transform: scale(0.90); }

  /* Permission */
  #permission-screen {
    position: absolute; inset: 0; background: #000;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px; z-index: 10;
  }
  #permission-screen p { color: #aaa; font-size: 13px; text-align: center; max-width: 220px; line-height: 1.7; }
  #start-btn {
    background: var(--blue); border: none; color: #fff;
    padding: 12px 32px; font-size: 13px; font-weight: 700;
    letter-spacing: 0.15em; text-transform: uppercase;
    cursor: pointer; border-radius: 3px;
  }

  /* Toast */
  #toast {
    position: fixed; bottom: 110px; left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.75); color: #fff;
    font-size: 12px; padding: 8px 20px;
    border-radius: 20px; opacity: 0;
    transition: opacity 0.3s; pointer-events: none;
    white-space: nowrap; z-index: 20;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>

<div id="header">
  <span id="logo">Y-Cam</span>
  <span id="mode-badge">CORGI</span>
</div>

<div id="viewfinder-wrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div id="grain"></div>
  <div id="vignette"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
  <div id="focus-ring"></div>
  <div id="flash"></div>
  <div id="film-counter">000</div>
  <div id="thumb-wrap"><img id="thumb-img" src="" alt=""></div>
  <div id="permission-screen">
    <span style="font-size:14px;letter-spacing:0.25em;color:#fff;font-weight:900">Y-CAM</span>
    <p>カメラへのアクセスを許可してください</p>
    <button id="start-btn">カメラを起動</button>
  </div>
</div>

<div id="preset-bar">
  <button class="preset-btn active" data-preset="corgi">CORGI</button>
  <button class="preset-btn" data-preset="shiba">SHIBA</button>
  <button class="preset-btn" data-preset="poodle">POODLE</button>
  <button class="preset-btn" data-preset="husky">HUSKY</button>
  <button class="preset-btn" data-preset="pug">PUG</button>
</div>

  <button id="save-btn">↓</button>
</div>

<div id="toast"></div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const grain = document.getElementById('grain');
const vignette = document.getElementById('vignette');
const focusRing = document.getElementById('focus-ring');
const flashEl = document.getElementById('flash');
const filmCounter = document.getElementById('film-counter');
const thumbWrap = document.getElementById('thumb-wrap');
const thumbImg = document.getElementById('thumb-img');
const modeBadge = document.getElementById('mode-badge');
const toast = document.getElementById('toast');
const permissionScreen = document.getElementById('permission-screen');

let facingMode = 'environment';
let shotCount = 0;
let currentPreset = 'corgi';
let lastDataUrl = null;
let stream = null;

const presets = {
  corgi:  { label:'CORGI',  f:'contrast(1.15) brightness(0.97) saturate(0.65) sepia(0.06)', grain:0.30, vig:0.62 },
  shiba:  { label:'SHIBA',  f:'contrast(1.22) brightness(0.93) grayscale(1)',                grain:0.48, vig:0.78 },
  poodle: { label:'POODLE', f:'contrast(1.25) brightness(1.02) saturate(1.32) hue-rotate(5deg)', grain:0.18, vig:0.48 },
  husky:  { label:'HUSKY',  f:'contrast(0.88) brightness(1.08) saturate(0.58) sepia(0.12)', grain:0.40, vig:0.38 },
  pug:    { label:'PUG',    f:'contrast(1.1) brightness(1.02) saturate(0.80) sepia(0.18) hue-rotate(10deg)', grain:0.24, vig:0.55 },
};

function applyPreset(name) {
  const p = presets[name];
  video.style.filter = p.f;
  grain.style.opacity = p.grain;
  vignette.style.opacity = p.vig;
  modeBadge.textContent = p.label;
}

async function startCamera() {
  try {
    if (stream) stream.getTracks().forEach(t => t.stop());
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width: { ideal: 1080 }, height: { ideal: 1350 } },
      audio: false,
    });
    video.srcObject = stream;
    permissionScreen.style.display = 'none';
    applyPreset(currentPreset);
  } catch(e) { showToast('カメラにアクセスできません'); }
}

document.getElementById('start-btn').addEventListener('click', startCamera);

document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentPreset = btn.dataset.preset;
    applyPreset(currentPreset);
  });
});

document.getElementById('viewfinder-wrap').addEventListener('click', e => {
  if (e.target.closest('#permission-screen')) return;
  const r = e.currentTarget.getBoundingClientRect();
  focusRing.style.left = (e.clientX - r.left) + 'px';
  focusRing.style.top  = (e.clientY - r.top)  + 'px';
  focusRing.style.display = 'block';
  focusRing.style.animation = 'none';
  void focusRing.offsetWidth;
  focusRing.style.animation = 'focusPulse 0.3s ease-out';
  setTimeout(() => focusRing.style.display = 'none', 1200);
});

document.getElementById('shutter-btn').addEventListener('click', shoot);

function shoot() {
  if (!stream) { showToast('カメラを起動してください'); return; }
  flashEl.style.opacity = 0.7;
  setTimeout(() => flashEl.style.opacity = 0, 100);

  const vw = video.videoWidth  || 1080;
  const vh = video.videoHeight || 1350;
  const ratio = 4 / 5;
  const vRatio = vw / vh;
  let sx, sy, sw, sh;
  if (vRatio > ratio) { sh = vh; sw = vh * ratio; sx = (vw - sw) / 2; sy = 0; }
  else { sw = vw; sh = vw / ratio; sx = 0; sy = (vh - sh) / 2; }

  const W = 1080, H = 1350;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  const p = presets[currentPreset];

  ctx.filter = p.f;
  ctx.drawImage(video, sx, sy, sw, sh, 0, 0, W, H);
  ctx.filter = 'none';

  if (p.vig > 0) {
    const vg = ctx.createRadialGradient(W/2, H/2, H*0.28, W/2, H/2, H*0.82);
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(1, `rgba(0,0,0,${p.vig * 0.82})`);
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, W, H);
  }

  if (p.grain > 0) {
    const id = ctx.getImageData(0, 0, W, H);
    const d = id.data;
    const intensity = p.grain * 55;
    for (let i = 0; i < d.length; i += 4) {
      const n = (Math.random() - 0.5) * intensity;
      d[i]   = Math.min(255, Math.max(0, d[i]   + n));
      d[i+1] = Math.min(255, Math.max(0, d[i+1] + n));
      d[i+2] = Math.min(255, Math.max(0, d[i+2] + n));
    }
    ctx.putImageData(id, 0, 0);
  }

  lastDataUrl = canvas.toDataURL('image/jpeg', 0.93);
  thumbImg.src = lastDataUrl;
  thumbWrap.style.opacity = 1;
  shotCount++;
  filmCounter.textContent = String(shotCount).padStart(3, '0');
  showToast('撮影しました');
}

document.getElementById('save-btn').addEventListener('click', async () => {
  if (!lastDataUrl) { showToast('先に撮影してください'); return; }
  const res  = await fetch(lastDataUrl);
  const blob = await res.blob();
  const file = new File([blob], `ycam_${Date.now()}.jpg`, { type: 'image/jpeg' });
  if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
    try { await navigator.share({ files: [file], title: 'Y-Cam' }); showToast('共有しました'); }
    catch(e) { if (e.name !== 'AbortError') fallbackDownload(); }
  } else { fallbackDownload(); }
});

function fallbackDownload() {
  const a = document.createElement('a');
  a.href = lastDataUrl; a.download = `ycam_${Date.now()}.jpg`;
  a.click(); showToast('保存しました');
}

document.getElementById('flip-btn').addEventListener('click', () => {
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  startCamera();
});

thumbWrap.addEventListener('click', () => {
  if (!lastDataUrl) return;
  const w = window.open();
  w.document.write(`<style>body{margin:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh}img{max-width:100%;max-height:100vh}</style><img src="${lastDataUrl}">`);
});

let toastTimer;
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
}
</script>
</body>
</html>
